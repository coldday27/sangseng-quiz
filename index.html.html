<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나는 어떤 상생 히어로? | 상생대학</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f3ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.wrap { background: #fff; border-radius: 20px; max-width: 480px; width: 100%; padding: 32px 28px; box-shadow: 0 4px 32px rgba(75,63,141,0.10); }
.logo { text-align: center; margin-bottom: 6px; }
.logo span { font-size: 12px; color: #7F77DD; font-weight: 600; letter-spacing: 0.05em; }
h1 { text-align: center; font-size: 22px; font-weight: 700; color: #26215C; margin-bottom: 6px; }
.subtitle { text-align: center; font-size: 13px; color: #888; margin-bottom: 24px; line-height: 1.6; }
.char-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 24px; }
.char-card { flex: 1; border-radius: 14px; border: 2px solid #e8e6f8; padding: 14px 6px 10px; text-align: center; cursor: pointer; background: #faf9ff; transition: all 0.15s; }
.char-card:hover { border-color: #AFA9EC; background: #EEEDFE; }
.char-card.selected { border-color: #7F77DD; background: #EEEDFE; }
.char-img { width: 80px; height: 80px; object-fit: contain; margin-bottom: 6px; background: transparent; }
.char-name { font-size: 12px; font-weight: 600; color: #534AB7; }
.char-desc { font-size: 11px; color: #999; margin-top: 2px; }
.stage-bar { display: flex; gap: 5px; justify-content: center; margin-bottom: 18px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #e0ddf7; }
.dot.done { background: #AFA9EC; }
.dot.active { background: #4B3F8D; }
.score-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 16px; }
.chip { background: #f5f3ff; border-radius: 8px; padding: 6px 16px; font-size: 12px; color: #534AB7; text-align: center; }
.chip b { display: block; font-size: 20px; color: #26215C; }
.q-box { background: #faf9ff; border: 1px solid #e8e6f8; border-radius: 12px; padding: 16px; margin-bottom: 14px; }
.q-num { font-size: 11px; color: #AFA9EC; margin-bottom: 6px; font-weight: 600; }
.q-text { font-size: 15px; font-weight: 600; color: #26215C; line-height: 1.55; }
.opts { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.opt { background: #faf9ff; border: 1.5px solid #e8e6f8; border-radius: 10px; padding: 10px; font-size: 13px; color: #26215C; cursor: pointer; text-align: left; transition: all 0.12s; line-height: 1.4; }
.opt:hover { background: #EEEDFE; border-color: #AFA9EC; }
.opt.correct { background: #E1F5EE; border-color: #1D9E75; color: #085041; }
.opt.wrong { background: #FCEBEB; border-color: #E24B4A; color: #791F1F; }
.opt.reveal { background: #E1F5EE; border-color: #1D9E75; color: #085041; }
.fb { border-radius: 10px; padding: 10px 14px; font-size: 13px; margin-bottom: 12px; font-weight: 500; }
.fb.ok { background: #E1F5EE; color: #085041; }
.fb.ng { background: #FCEBEB; color: #791F1F; }
.btn-main { width: 100%; padding: 13px; background: #4B3F8D; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.12s; }
.btn-main:hover { background: #3C3489; }
.btn-main:disabled { opacity: 0.4; cursor: default; }
.result-box { text-align: center; padding: 8px 0; }
.res-img { width: 120px; height: 120px; object-fit: contain; margin: 0 auto 12px; display: block; }
.res-type { font-size: 12px; color: #7F77DD; font-weight: 600; margin-bottom: 4px; letter-spacing: 0.04em; }
.res-title { font-size: 22px; font-weight: 700; color: #26215C; margin-bottom: 10px; }
.res-desc { font-size: 14px; color: #555; line-height: 1.7; margin-bottom: 20px; white-space: pre-line; }
.res-scores { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
.share-row { display: flex; gap: 8px; margin-bottom: 10px; }
.btn-share { flex: 1; padding: 11px; background: #EEEDFE; color: #3C3489; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-share:hover { background: #CECBF6; }
.btn-retry { width: 100%; padding: 11px; background: #f5f3ff; color: #534AB7; border: 1.5px solid #CECBF6; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 2px; }
.btn-retry:hover { background: #EEEDFE; }
</style>
</head>

let sel=-1, qs=[], idx=0, score=0, done=false;
function selectChar(i) {
  sel = i;
  document.querySelectorAll(".char-card").forEach((c,j) => c.classList.toggle("selected", i===j));
  document.getElementById("start-btn").disabled = false;
}
function shuffle(a) { return [...a].sort(() => Math.random()-0.5); }
function startQuiz() {
  qs = shuffle(QS).slice(0,5); idx=0; score=0; done=false;
  document.getElementById("phase-select").style.display = "none";
  document.getElementById("phase-quiz").style.display = "block";
  renderQ();
}
function renderQ() {
  const total = qs.length;
  document.getElementById("stage-bar").innerHTML = qs.map((_,i) =>
    '<div class="dot ' + (i<idx?"done":i===idx?"active":"") + '"></div>').join("");
  document.getElementById("score-disp").textContent = score;
  document.getElementById("remain-disp").textContent = total - idx;
  const q = qs[idx];
  document.getElementById("q-num").textContent = "Q"+(idx+1)+" / "+total;
  document.getElementById("q-text").textContent = q.q;
  document.getElementById("opts").innerHTML = q.opts.map((o,i) =>
    '<button class="opt" onclick="answer('+i+')">' + o + '</button>').join("");
  document.getElementById("fb").style.display = "none";
  document.getElementById("next-btn").style.display = "none";
  done = false;
}
function answer(i) {
  if (done) return; done = true;
  const q = qs[idx];
  document.querySelectorAll(".opt").forEach((b,j) => {
    if (j===q.ans) b.classList.add(i===q.ans?"correct":"reveal");
    else if (j===i) b.classList.add("wrong");
  });
  const fb = document.getElementById("fb");
  if (i===q.ans) { score+=20; fb.className="fb ok"; fb.textContent="정답! 상생 포인트 +20"; }
  else { fb.className="fb ng"; fb.textContent='아쉽! 정답은 "'+q.opts[q.ans]+'"'; }
  document.getElementById("score-disp").textContent = score;
  fb.style.display = "block";
  const nb = document.getElementById("next-btn");
  nb.style.display = "block";
  nb.textContent = idx===qs.length-1 ? "결과 보기" : "다음 문제";
}
function nextQ() { idx++; if (idx>=qs.length) { showResult(); return; } renderQ(); }
function showResult() {
  document.getElementById("phase-quiz").style.display = "none";
  document.getElementById("phase-result").style.display = "block";
  const r = RESULTS[sel];
  document.getElementById("res-img").src = IMGS[sel];
  document.getElementById("res-title").textContent = r.title;
  document.getElementById("res-desc").textContent = r.desc;
  document.getElementById("res-score").textContent = score+"점";
  document.getElementById("res-rate").textContent = Math.round(score/(qs.length*20)*100)+"%";
}
function copyResult() {
  const r = RESULTS[sel];
  const text = "[상생대학 히어로 테스트]\n나의 유형: "+r.title+"\n점수: "+document.getElementById("res-score").textContent+"\n\n"+r.desc+"\n\n공공상생연대기금 상생대학";
  navigator.clipboard.writeText(text).then(()=>alert("결과가 복사되었어요!")).catch(()=>alert("복사 실패. 직접 캡처해서 공유해 보세요!"));
}
function resetGame() {
  sel=-1;
  document.querySelectorAll(".char-card").forEach(c => c.classList.remove("selected"));
  document.getElementById("start-btn").disabled = true;
  document.getElementById("phase-result").style.display = "none";
  document.getElementById("phase-select").style.display = "block";
}
</script>
</body>
